<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MythicMon</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/menus.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>
<body>

    <!-- ========================================= -->
    <!-- LOADING SCREEN -->
    <!-- ========================================= -->

    <div id="loadingScreen" class="loading-screen">

        <div class="loading-content">

            <h1 class="logo">
                MYTHICMON
            </h1>

            <p class="loading-text">
                Loading Adventure...
            </p>

            <div class="loading-bar">

                <div
                    id="loadingProgress"
                    class="loading-progress"
                ></div>

            </div>

        </div>

    </div>

    <!-- ========================================= -->
    <!-- TITLE SCREEN -->
    <!-- ========================================= -->

    <main id="titleScreen" class="title-screen hidden">

        <div class="background-layer"></div>

        <div class="title-content">

            <h1 class="game-title">
                MythicMon
            </h1>

            <p class="game-subtitle">
                Collect. Explore. Create.
            </p>

            <div class="main-menu">

                <button
                    id="continueBtn"
                    class="menu-button primary"
                >
                    Continue Adventure
                </button>

                <button
                    id="newGameBtn"
                    class="menu-button"
                >
                    New Adventure
                </button>

                <button
                    id="collectionBtn"
                    class="menu-button"
                >
                    Collection
                </button>

                <button
                    id="settingsBtn"
                    class="menu-button"
                >
                    Settings
                </button>

                <button
                    id="creditsBtn"
                    class="menu-button"
                >
                    Credits
                </button>

            </div>

        </div>

    </main>

    <!-- ========================================= -->
    <!-- PROFILE SELECT -->
    <!-- ========================================= -->

    <section
        id="profileScreen"
        class="profile-screen hidden"
    >

        <div class="panel large-panel">

            <h2>
                Select Profile
            </h2>

            <div
                id="profileContainer"
                class="profile-grid"
            >

                <!-- Generated by JS -->

            </div>

            <button
                id="createProfileBtn"
                class="menu-button primary"
            >
                Create Profile
            </button>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- MAIN HUB -->
    <!-- ========================================= -->

    <section
        id="hubScreen"
        class="hub-screen hidden"
    >

        <!-- Top Bar -->

        <header class="top-bar">

            <div class="player-section">

                <span id="playerName">
                    Trainer
                </span>

                <span id="playerLevel">
                    Lv. 1
                </span>

            </div>

            <div class="currency-section">

                <span id="coinDisplay">
                    🪙 0
                </span>

                <span id="gemDisplay">
                    💎 0
                </span>

            </div>

        </header>

        <!-- Main Content -->

        <div class="hub-container">

            <h1 class="hub-title">
                Adventure Hub
            </h1>

            <div class="hub-grid">

                <button
                    class="hub-card"
                    data-screen="adventure"
                >
                    <span class="card-icon">
                        🌎
                    </span>

                    <span class="card-title">
                        Adventure
                    </span>

                    <span class="card-description">
                        Explore the official world.
                    </span>
                </button>

                <button
                    class="hub-card"
                    data-screen="safari"
                >
                    <span class="card-icon">
                        🌿
                    </span>

                    <span class="card-title">
                        Safari
                    </span>

                    <span class="card-description">
                        Discover living creatures.
                    </span>
                </button>

                <button
                    class="hub-card"
                    data-screen="collection"
                >
                    <span class="card-icon">
                        📚
                    </span>

                    <span class="card-title">
                        Collection
                    </span>

                    <span class="card-description">
                        View every MythicMon.
                    </span>
                </button>

                <button
                    class="hub-card"
                    data-screen="packs"
                >
                    <span class="card-icon">
                        🃏
                    </span>

                    <span class="card-title">
                        Packs
                    </span>

                    <span class="card-description">
                        Open booster packs.
                    </span>
                </button>

                <button
                    class="hub-card"
                    data-screen="battleTower"
                >
                    <span class="card-icon">
                        🏆
                    </span>

                    <span class="card-title">
                        Battle Tower
                    </span>

                    <span class="card-description">
                        Face powerful opponents.
                    </span>
                </button>

                <button
                    class="hub-card"
                    data-screen="editor"
                >
                    <span class="card-icon">
                        🏗
                    </span>

                    <span class="card-title">
                        Map Creator
                    </span>

                    <span class="card-description">
                        Build platforming adventures.
                    </span>
                </button>

                <button
                    class="hub-card"
                    data-screen="campaigns"
                >
                    <span class="card-icon">
                        🌐
                    </span>

                    <span class="card-title">
                        Campaign Browser
                    </span>

                    <span class="card-description">
                        Play community worlds.
                    </span>
                </button>

                <button
                    class="hub-card"
                    data-screen="settings"
                >
                    <span class="card-icon">
                        ⚙
                    </span>

                    <span class="card-title">
                        Settings
                    </span>

                    <span class="card-description">
                        Customize your game.
                    </span>
                </button>

            </div>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- MODAL -->
    <!-- ========================================= -->

    <div
        id="modalOverlay"
        class="modal-overlay hidden"
    >

        <div class="modal-window">

            <button
                id="closeModalBtn"
                class="close-button"
            >
                ✕
            </button>

            <div id="modalContent">

            </div>

        </div>

    </div>

    <!-- ========================================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================================= -->

    <script src="js/core/config.js"></script>
    <script src="js/core/helpers.js"></script>
    <script src="js/save/saveManager.js"></script>
    <script src="js/core/script.js"></script>
    
</body>
</html>
