<!DOCTYPE html>
<html>

<head>

    <title>
        MythicMon
    </title>

    <link
    rel="stylesheet"
    href="style.css">

</head>

<body>

<!-- ======================
NAVBAR
====================== -->

<nav>

    <div class="logo">
        MythicMon
    </div>

    <div class="nav-links">

        <a href="index.html">
            Shop
        </a>

        <a href="safari.html">
            Safari
        </a>

        <a href="collection.html">
            Collection
        </a>

    </div>

    <div class="coins">

        Coins:
        <span id="coin-display">
            100
        </span>

    </div>

</nav>

<!-- ======================
STARTER MODAL
====================== -->

<div id="starter-modal">

    <div class="starter-box">

        <h2>
            Choose Your Starter
        </h2>

        <button
        onclick="chooseStarter('Flaretail')">

            Flaretail

        </button>

        <button
        onclick="chooseStarter('Aquafang')">

            Aquafang

        </button>

        <button
        onclick="chooseStarter('Leafhorn')">

            Leafhorn

        </button>

    </div>

</div>

<!-- ======================
PACK SHOP
====================== -->

<section class="shop-title">

    <h1>
        Pack Shop
    </h1>

    <p>
        Open packs to expand your collection.
    </p>

</section>

<section class="pack-grid">

    <div class="pack-card forest">

        <h2>
            Verdant Pack
        </h2>

        <p>
            Forest Creatures
        </p>

        <button
        onclick="openPack('forest')">

            Open Pack
        </button>

    </div>

    <div class="pack-card ember">

        <h2>
            Ember Pack
        </h2>

        <p>
            Fire Creatures
        </p>

        <button
        onclick="openPack('ember')">

            Open Pack
        </button>

    </div>

    <div class="pack-card reef">

        <h2>
            Reef Pack
        </h2>

        <p>
            Water Creatures
        </p>

        <button
        onclick="openPack('reef')">

            Open Pack
        </button>

    </div>

</section>

<!-- ======================
PACK OPENING SCREEN
====================== -->

<div id="pack-overlay">

    <div id="pack-card">

    </div>

</div>

<!-- ======================
OUTPUT
====================== -->

<div id="output">

</div>

<script src="script.js"></script>

</body>
</html>
