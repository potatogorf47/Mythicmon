<!DOCTYPE html>
<html>
<head>
    <title>MythicMon - Pack Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>

    <div class="logo">
        MythicMon
    </div>

    <div class="nav-links">
        <a href="index.html">Shop</a>
        <a href="safari.html">Safari</a>
        <a href="collection.html">Collection</a>
    </div>

    <div class="currency">
        Coins:
        <span id="coin-display">100</span>
    </div>

</nav>

<section class="hero">

    <h1>Pack Shop</h1>

    <p>
        Open packs and collect creatures.
    </p>

</section>

<section class="pack-section">

    <div class="pack-grid">

        <div class="pack-card reef-pack">

            <h3>Tidal Reef Pack</h3>

            <p>Creatures from Tidal Reef Safari</p>

            <button onclick="openPack('reef')">
                Open Pack
            </button>

        </div>

        <div class="pack-card ember-pack">

            <h3>Ember Valley Pack</h3>

            <p>Creatures from Ember Valley Safari</p>

            <button onclick="openPack('ember')">
                Open Pack
            </button>

        </div>

        <div class="pack-card forest-pack">

            <h3>Verdant Forest Pack</h3>

            <p>Creatures from Verdant Forest Safari</p>

            <button onclick="openPack('forest')">
                Open Pack
            </button>

        </div>

    </div>

</section>

<section id="starter-selection">

    <h2>Choose Your Starter</h2>

    <button onclick="chooseStarter('Flaretail')">
        Flaretail
    </button>

    <button onclick="chooseStarter('Aquafang')">
        Aquafang
    </button>

    <button onclick="chooseStarter('Leafhorn')">
        Leafhorn
    </button>

</section>

<section id="game-output">

    <h2>Pack Results</h2>

    <div id="output"></div>

</section>

<script src="script.js"></script>

</body>
</html>
