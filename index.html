<!DOCTYPE html>
<html>

<head>

    <title>MythicMon</title>

    <link rel="stylesheet"
    href="style.css">

</head>

<body>

<nav>

    <div class="logo">
        MythicMon
    </div>

    <div class="nav-links">

        <a href="index.html">
            Shop
        </a>

        <a href="safari.html">
            Safari
        </a>

        <a href="collection.html">
            Collection
        </a>

    </div>

    <div class="currency">

        Coins:
        <span id="coin-display">
            100
        </span>

    </div>

</nav>

<section class="hero">

    <h1>
        Pack Shop
    </h1>

    <p>
        Open packs and collect MythicMon.
    </p>

</section>

<section class="pack-section">

    <div class="pack-grid">

        <div class="pack-card forest-pack">

            <h2>
                Verdant Pack
            </h2>

            <p>
                Forest Creatures
            </p>

            <button
            onclick="openPack('forest')">

                Open Pack

            </button>

        </div>

        <div class="pack-card ember-pack">

            <h2>
                Ember Pack
            </h2>

            <p>
                Fire Creatures
            </p>

            <button
            onclick="openPack('ember')">

                Open Pack

            </button>

        </div>

        <div class="pack-card reef-pack">

            <h2>
                Reef Pack
            </h2>

            <p>
                Water Creatures
            </p>

            <button
            onclick="openPack('reef')">

                Open Pack

            </button>

        </div>

    </div>

</section>

<!-- STARTER MODAL -->

<div id="starter-modal">

    <div class="starter-box">

        <h1>
            Choose Your Starter
        </h1>

        <div class="starter-grid">

            <div
            class="starter-card"
            onclick="chooseStarter('Flaretail')">

                <h2>
                    Flaretail
                </h2>

                <p>
                    Fire Type
                </p>

            </div>

            <div
            class="starter-card"
            onclick="chooseStarter('Aquafang')">

                <h2>
                    Aquafang
                </h2>

                <p>
                    Water Type
                </p>

            </div>

            <div
            class="starter-card"
            onclick="chooseStarter('Leafhorn')">

                <h2>
                    Leafhorn
                </h2>

                <p>
                    Nature Type
                </p>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
