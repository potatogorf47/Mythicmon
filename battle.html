<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>MythicMon Battle</title>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/battle.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="battle-screen">

    <!-- ================================= -->
    <!-- TOP INFORMATION -->
    <!-- ================================= -->

    <header class="top-bar">

        <button onclick="history.back()">

            ← Leave Battle

        </button>

        <h2 id="battleTitle">

            Wild Encounter

        </h2>

        <span id="turnCounter">

            Turn 1

        </span>

    </header>

    <!-- ================================= -->
    <!-- BATTLEFIELD -->
    <!-- ================================= -->

    <main class="battlefield">

        <!-- Player -->

        <section class="battle-side">

            <div class="battle-creature">

                <img id="playerCreatureImage"
                     src="assets/ui/placeholderCreature.png">

            </div>

            <div class="battle-info">

                <h2 id="playerCreatureName">

                    Your Creature

                </h2>

                <div class="health-bar">

                    <div class="health-fill"
                         id="playerHealth">

                    </div>

                </div>

                <div class="energy-bar">

                    <div class="energy-fill"
                         id="playerEnergy">

                    </div>

                </div>

                <div class="status-icons"
                     id="playerStatus">

                </div>

            </div>

        </section>

        <!-- Enemy -->

        <section class="battle-side">

            <div class="battle-creature">

                <img id="enemyCreatureImage"
                     src="assets/ui/placeholderCreature.png">

            </div>

            <div class="battle-info">

                <h2 id="enemyCreatureName">

                    Wild Creature

                </h2>

                <div class="health-bar">

                    <div class="health-fill"
                         id="enemyHealth">

                    </div>

                </div>

                <div class="energy-bar">

                    <div class="energy-fill"
                         id="enemyEnergy">

                    </div>

                </div>

                <div class="status-icons"
                     id="enemyStatus">

                </div>

            </div>

        </section>

        <!-- Floating UI -->

        <div class="turn-order"
             id="turnOrder">

        </div>

        <div class="battle-log"
             id="battleLog">

            A wild creature appeared!

        </div>

    </main>

    <!-- ================================= -->
    <!-- MOVE PANEL -->
    <!-- ================================= -->

    <section class="move-panel">

        <button class="move-button">

            <div class="move-name">

                Move 1

            </div>

            <div class="move-description">

                Description

            </div>

        </button>

        <button class="move-button">

            <div class="move-name">

                Move 2

            </div>

            <div class="move-description">

                Description

            </div>

        </button>

        <button class="move-button">

            <div class="move-name">

                Move 3

            </div>

            <div class="move-description">

                Description

            </div>

        </button>

        <button class="move-button">

            <div class="move-name">

                Move 4

            </div>

            <div class="move-description">

                Description

            </div>

        </button>

    </section>

</div>

<script type="module"
        src="js/battle/battle.js"></script>

</script>

</body>

</html>
