<!DOCTYPE html>
<html>

<head>

<title>Battle</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="battle-screen">

    <div class="enemy-side">

        <h2 id="enemy-name">

        </h2>

        <div class="hp-bar">

            <div id="enemy-hp">

            </div>

        </div>

        <div class="sprite">

            Enemy
        </div>

    </div>

    <div class="player-side">

        <div class="sprite">

            Starter
        </div>

        <h2 id="player-name">

        </h2>

        <div class="hp-bar">

            <div id="player-hp">

            </div>

        </div>

    </div>

</div>

<div id="battle-log">

</div>

<div id="battle-area"></div>

<script src="script.js"></script>

<script>
startBattle();
</script>

</body>

</html>
