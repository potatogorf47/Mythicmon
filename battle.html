<!DOCTYPE html>
<html>

<head>

    <title>MythicMon Battle</title>

    <link rel="stylesheet"
    href="style.css">

</head>

<body class="battle-page">

    <nav>

        <div class="logo">
            MythicMon
        </div>

    </nav>

    <div class="battle-screen">

        <!-- ENEMY -->

        <div class="enemy-area">

            <div class="enemy-card">

                <h2 id="enemy-name">
                    Enemy
                </h2>

                <p>
                    HP:
                    <span id="enemy-hp-text">
                        100
                    </span>
                </p>

                <div class="hp-container">

                    <div
                    id="enemy-hp-fill"
                    class="hp-fill">

                    </div>

                </div>

            </div>

            <div class="enemy-sprite">

                Enemy Art

            </div>

        </div>

        <!-- PLAYER -->

        <div class="player-area">

            <div class="player-sprite">

                Starter Art

            </div>

            <div class="player-card">

                <h2 id="player-name">
                    Your MythicMon
                </h2>

                <p>
                    HP:
                    <span id="player-hp-text">
                        100
                    </span>
                </p>

                <div class="hp-container">

                    <div
                    id="player-hp-fill"
                    class="hp-fill">

                    </div>

                </div>

            </div>

        </div>

        <!-- BATTLE MENU -->

        <div class="battle-menu">

            <div id="battle-log">

                A wild creature appeared!

            </div>

            <button onclick="attackEnemy()">

                Attack

            </button>

        </div>

    </div>

    <script src="script.js"></script>
    <script src="battle.js"></script>

</body>

</html>
