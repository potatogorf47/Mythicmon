<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

      content="width=device-width, initial-scale=1.0">

<title>MythicMon Packs</title>

<link rel="stylesheet" href="css/variables.css">

<body>

<div class="container">

<header class="top-bar">

<button onclick="location.href='home.html'">

← Return Home

</button>

<h1>

Mythic Packs

</h1>

<div>

<span id="coinsDisplay">

</span>

</div>

</header>

<main>

<section class="card">

<div class="card-body">

<h2>

Available Packs

</h2>

<div class="collection-grid">

<button class="collection-card">

<div class="collection-art">

📦

</div>

<div class="collection-info">

Forest Pack

</h3>

<p>

Common Forest MythicMon

</p>

</div>

</button>

<button class="collection-card">

Ocean Pack

</h3>

<p>

Water Creatures

</p>

</div>

</button>

<button class="collection-card">

<div class="collection-art">

🔥

</div>

<div class="collection-info">

<h3>

Volcano Pack

</h3>

<p>

Fire Creatures

</p>

</div>

</button>

<button class="collection-card">

<div class="collection-art">

✨

</div>

<div class="collection-info">

<h3>

Legend Pack

</h3>

<p>

Extremely Rare

</p>

</div>

</button>

</div>

</div>

</section>

<section class="card">

<div class="card-body">

<h2>

Opening Area

</h2>

<div id="packOpeningArea">

<p>

Select a pack to begin.

</p>

</div>

</div>

<section class="card">

<div class="card-body">

Recent Pulls

</h2>

<div
id="recentPulls"
class="collection-grid">

</div>

</main>

</div>

<script type="module"
src="js/packsPage.js">
