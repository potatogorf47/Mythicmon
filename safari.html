<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>MythicMon Safari</title>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/safari.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="safari-layout">

    <!-- ================================= -->
    <!-- LEFT SIDEBAR -->
    <!-- ================================= -->

    <aside class="left-sidebar">

        <h2>Expedition</h2>

        <button onclick="location.href='home.html'">
            ← Return Home
        </button>

        <hr>

        <h3>Party</h3>

        <div id="partyContainer"></div>

        <hr>

        <h3>Traversal Abilities</h3>

        <div id="abilityContainer"></div>

        <hr>

        <h3>Current Quest</h3>

        <div id="questPanel">

            <p>No active quest.</p>

        </div>

    </aside>

    <!-- ================================= -->
    <!-- SAFARI WORLD -->
    <!-- ================================= -->

    <main class="safari-main">

        <canvas id="safariCanvas"></canvas>

        <div id="territoryBanner"
             class="fade-in"
             hidden>

            Territory Warning

        </div>

        <div id="alphaBanner"
             hidden>

            Alpha Nearby!

        </div>

        <div class="discovery-banner"
             hidden
             id="discoveryBanner">

            New Area Discovered

        </div>

        <div class="weather-overlay"
             id="weatherOverlay">

        </div>

    </main>

    <!-- ================================= -->
    <!-- RIGHT SIDEBAR -->
    <!-- ================================= -->

    <aside class="right-sidebar">

        <h2>Explorer Tools</h2>

        <canvas id="miniMap"
                width="280"
                height="180">

        </canvas>

        <hr>

        <h3>Selected Creature</h3>

        <div id="selectedCreature">

            <p>

                Observe a creature to learn
                more about it.

            </p>

        </div>

        <hr>

        <h3>Environment</h3>

        <div id="environmentInfo">

            <p>Weather: Sunny</p>

            <p>Biome: Forest</p>

            <p>Time: Morning</p>

        </div>

        <hr>

        <h3>Photography</h3>

        <button id="cameraButton">

            📸 Take Photo

        </button>

    </aside>

</div>

<!-- ================================= -->
<!-- CREATURE INTERACTION -->
<!-- ================================= -->

<div class="popup"
     id="creaturePopup"
     hidden>

    <div class="popup-card">

        <h2 id="popupCreatureName">

            Unknown Creature

        </h2>

        <p id="popupCreatureDescription">

        </p>

        <div class="popup-buttons">

            <button id="observeButton">

                👀 Observe

            </button>

            <button id="feedButton">

                🍓 Feed

            </button>

            <button id="battleButton">

                ⚔ Battle

            </button>

            <button id="leaveButton">

                🚶 Leave

            </button>

        </div>

    </div>

</div>

<script type="module"
        src="js/safariPage.js">

</script>

</body>

</html>
