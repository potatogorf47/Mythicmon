<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MythicMon Safari</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/safari.css">

</head>

<body>

<!-- ========================================= -->
<!-- TOP BAR -->
<!-- ========================================= -->

<header class="top-bar">

    <div class="left-top">

        <button id="backButton">

            ← Hub

        </button>

    </div>

    <div class="center-top">

        <span id="zoneName">

            Emerald Forest

        </span>

    </div>

    <div class="right-top">

        <span id="weatherDisplay">

            ☀ Clear

        </span>

        <span id="timeDisplay">

            Morning

        </span>

    </div>

</header>

<!-- ========================================= -->
<!-- MAIN LAYOUT -->
<!-- ========================================= -->

<div class="safari-layout">

<!-- ========================================= -->
<!-- LEFT SIDEBAR -->
<!-- ========================================= -->

<aside class="left-sidebar">

    <section class="panel">

        <h2>

            Party

        </h2>

        <div id="partyContainer">

        </div>

    </section>

    <section class="panel">

        <h2>

            Active Abilities

        </h2>

        <div id="abilityContainer">

        </div>

    </section>

</aside>

<!-- ========================================= -->
<!-- SAFARI VIEW -->
<!-- ========================================= -->

<main class="safari-main">

    <canvas

        id="safariCanvas"

        width="1600"

        height="900"

    ></canvas>

    <!-- Territory Warning -->

    <div

        id="territoryBanner"

        class="hidden"

    >

        ⚠ Entering Territory

    </div>

    <!-- Alpha Warning -->

    <div

        id="alphaBanner"

        class="hidden"

    >

        ★ Alpha Nearby ★

    </div>

</main>

<!-- ========================================= -->
<!-- RIGHT SIDEBAR -->
<!-- ========================================= -->

<aside class="right-sidebar">

    <section class="panel">

        <h2>

            Creature

        </h2>

        <div id="selectedCreature">

            Click a creature...

        </div>

    </section>

    <section class="panel">

        <h2>

            Objective

        </h2>

        <div id="questPanel">

        </div>

    </section>

    <section class="panel">

        <h2>

            Minimap

        </h2>

        <canvas

            id="miniMap"

            width="250"

            height="250"

        ></canvas>

    </section>

</aside>

</div>

<!-- ========================================= -->
<!-- CREATURE POPUP -->
<!-- ========================================= -->

<div

    id="creaturePopup"

    class="popup hidden"

>

    <div class="popup-card">

        <h2

            id="popupName"

        >

            Sparkit

        </h2>

        <p

            id="popupLevel"

        >

            Lv. 5

        </p>

        <p

            id="popupMood"

        >

            😊 Curious

        </p>

        <div class="popup-buttons">

            <button

                id="battleButton"

            >

                Battle

            </button>

            <button

                id="observeButton"

            >

                Observe

            </button>

            <button

                id="feedButton"

            >

                Feed

            </button>

            <button

                id="photoButton"

            >

                Photograph

            </button>

            <button

                id="cancelPopup"

            >

                Cancel

            </button>

        </div>

    </div>

</div>

<!-- ========================================= -->
<!-- JAVASCRIPT -->
<!-- ========================================= -->

<script src="js/config.js"></script>

<script src="js/helpers.js"></script>

<script src="js/player/player.js"></script>

<script src="js/player/inventory.js"></script>

<script src="js/player/collection.js"></script>

<script src="js/safari/weatherSystem.js"></script>

<script src="js/safari/territoryManager.js"></script>

<script src="js/safari/ecosystem.js"></script>

<script src="js/safari/spawnManager.js"></script>

<script src="js/safari/safariAI.js"></script>

<script src="js/safari.js"></script>

</body>

</html>
