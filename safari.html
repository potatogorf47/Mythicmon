<nav>

    <div class="logo">
        MythicMon

    <div class="nav-links">

<h1>Safari Zones</h1>

<div class="safari-grid">

    <div class="safari-card">

        <div class="safari-image"></div>

        <h2>
            Verdant Forest
        </h2>

        <ul>

            <li>Leafhorn</li>
            <li>Mosshell</li>

        </ul>

        <button
        onclick="enterSafari('forest')">

            Enter

        </button>

    </div>

    <div class="safari-card">

        <div class="safari-image"></div>

        <h2>
            Ember Valley
        </h2>

        <ul>

            <li>Flaretail</li>
            <li>Thunderclaw</li>

        </ul>

        <button
        onclick="enterSafari('ember')">

            Enter

        </button>

    </div>

    <div class="safari-card">

        <div class="safari-image"></div>

        <h2>
            Tidal Reef
        </h2>

        <ul>

            <li>Aquafang</li>
            <li>Crystalback</li>

        </ul>

        <button
        onclick="enterSafari('reef')">

            Enter

        </button>

    </div>

</div>

<div id="battle-area"></div>

<script src="script.js"></script>
