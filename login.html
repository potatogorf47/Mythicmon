<!DOCTYPE html>
<html>

<head>
<title>MythicMon Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <h1>
        MythicMon
    </h1>

    <input
    id="username"
    placeholder="Username">

    <input
    id="password"
    type="password"
    placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <button onclick="createAccount()">
        Create Account
    </button>

</div>

<script src="script.js"></script>

</body>

</html>
