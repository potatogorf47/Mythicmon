<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MythicMon Field Guide</title>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/collection.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="collection-screen">

<!-- ===================================== -->
<!-- FILTER SIDEBAR -->
<!-- ===================================== -->

<aside class="collection-sidebar">

<h2>

Field Guide

</h2>

<button onclick="location.href='home.html'">

← Return Home

</button>

<hr>

<h3>

Search

</h3>

<input
id="searchCreatures"
placeholder="Search MythicMon...">

<hr>

<h3>

Filters

</h3>

<select id="typeFilter">

<option>All Types</option>

</select>

<select id="rarityFilter">

<option>All Rarities</option>

</select>

<select id="habitatFilter">

<option>All Habitats</option>

</select>

<select id="regionFilter">

<option>All Regions</option>

</select>

<hr>

<h3>

Sort By

</h3>

<select id="sortFilter">

<option>Name</option>

<option>Level</option>

<option>Discovery Date</option>

<option>Rarity</option>

<option>Research Progress</option>

</select>

</aside>

<!-- ===================================== -->
<!-- COLLECTION -->
<!-- ===================================== -->

<main class="collection-content">

<h1>

MythicMon Field Guide

</h1>

<p>

Research every species you've encountered.

</p>

<div
class="collection-grid"
id="creatureGrid">

</div>

</main>

<!-- ===================================== -->
<!-- RESEARCH PANEL -->
<!-- ===================================== -->

<aside class="showcase-panel">

<h2>

Research

</h2>

<div id="selectedCreaturePanel">

<p>

Select a MythicMon.

</p>

</div>

<hr>

<h3>

Research Progress

</h3>

<div class="progress-bar">

<div
id="researchProgress"
class="progress-fill">

</div>

</div>

<p
id="researchPercent">

0%

</p>

<hr>

<h3>

Discovery Notes

</h3>

<div
id="researchNotes">

No observations yet.

</div>

</aside>

</div>

<script
type="module"
src="js/collectionPage.js">

</script>

</body>

</html>
